services:
  - type: cron
    name: hsr-flat-bot
    runtime: python
    schedule: "*/30 * * * *"
    buildCommand: pip install -r requirements.txt && playwright install --with-deps chromium
    startCommand: ./run.sh
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: FB_GROUP_URLS
        sync: false
      - key: GIT_REPO_URL
        sync: false
      - key: GIT_TOKEN
        sync: false
      - key: LOG_LEVEL
        value: INFO
